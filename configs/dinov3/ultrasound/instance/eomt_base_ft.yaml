trainer:
  max_epochs: 12
  check_val_every_n_epoch: 120
  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eomt"
      name: "needle_gold_suture_instance_eomt_base_1024_dinov3_ft"
model:
  class_path: training.mask_classification_instance.MaskClassificationInstance
  init_args:
    attn_mask_annealing_enabled: False
    lr: 2e-4
    llrd_l2_enabled: False
    warmup_steps: [100, 200]
    delta_weights: True
    ckpt_path: /mnt/FileExchange/users/zhouyang/pretrained/pytorch_model.bin
    load_ckpt_class_head: False
    network:
      class_path: models.eomt.EoMT
      init_args:
        num_q: 200
        num_blocks: 3
        encoder:
          class_path: models.vit.ViT
          init_args:
            backbone_name: facebook/dinov3-vitb16-pretrain-lvd1689m
            local_backbone_init: True
            backbone_ckpt_path: /mnt/FileExchange/users/zhouyang/pretrained/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth
data:
  class_path: datasets.coco_instance_local.COCOInstanceLocal
  init_args:
    path: /mnt/data2/datasets/instruments_2.0/iterupdate/ultrasound/训练集
    train_image_dir: train2017
    val_image_dir: train2017
    train_annotations: annotations/instances_train2017.json
    val_annotations: annotations/instances_train2017.json
    num_classes: 1
